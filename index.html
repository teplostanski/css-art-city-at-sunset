    <style>
      :root {
        --size: 10px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        display: flex;
        height: 100vh;
        font-size: 14px;
        color: #455887;
        font-family: Arial, Helvetica, sans-serif;
        line-height: 1.4em;
        margin: 0;
        align-items: center;
        justify-content: center;
      }

      .wrap {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        height: fit-content;
        display: flex;
        flex-direction: column;
        /*box-shadow: 0 0 30px 0 rgba(0, 0, 0, 0.15);*/
        border-radius: 0 0 4px 4px;
      }

      .list {
        list-style: none;
        padding: 0;
        margin: 14px 0;
        text-align: end;
      }

      .link {
        color: inherit;
        text-underline-offset: 3px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(15, calc(var(--size) * 2));
        grid-template-rows: repeat(15, calc(var(--size) * 2));
        background: aliceblue;
      }

      .cell {
        width: var(--size);
        height: var(--size);
        position: relative;

        &::before {
          content: '';
          position: absolute;
          width: var(--size);
          height: var(--size);
          top: var(--size);
          left: 0;
        }
      }
